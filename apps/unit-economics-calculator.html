<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unit Economics Calculator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f1117;
    color: #e2e4e9;
    min-height: 100vh;
    padding: 20px;
  }
  .container { max-width: 640px; margin: 0 auto; }
  h1 {
    font-size: 1.75rem;
    font-weight: 700;
    text-align: center;
    margin-bottom: 8px;
    color: #fff;
  }
  .subtitle {
    text-align: center;
    color: #8b8fa3;
    font-size: 0.9rem;
    margin-bottom: 32px;
  }
  .card {
    background: #1a1d27;
    border: 1px solid #2a2d3a;
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
  }
  .card h2 {
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 20px;
    color: #c0c3ce;
  }
  .input-group { margin-bottom: 16px; }
  .input-group label {
    display: block;
    font-size: 0.85rem;
    color: #8b8fa3;
    margin-bottom: 6px;
  }
  .input-group input {
    width: 100%;
    padding: 12px 14px;
    background: #12141c;
    border: 1px solid #2a2d3a;
    border-radius: 8px;
    color: #e2e4e9;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-group input:focus { border-color: #6366f1; }
  .input-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .metric-card {
    background: #12141c;
    border-radius: 10px;
    padding: 18px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .indicator {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .ind-green { background: #22c55e; box-shadow: 0 0 8px #22c55e66; }
  .ind-yellow { background: #eab308; box-shadow: 0 0 8px #eab30866; }
  .ind-red { background: #ef4444; box-shadow: 0 0 8px #ef444466; }
  .metric-info { flex: 1; }
  .metric-name {
    font-size: 0.8rem;
    color: #8b8fa3;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .metric-value {
    font-size: 1.35rem;
    font-weight: 700;
    color: #fff;
  }
  .metric-benchmark {
    font-size: 0.75rem;
    color: #555;
    margin-top: 3px;
  }
  .verdict-box {
    text-align: center;
    padding: 20px;
    border-radius: 10px;
    margin-top: 8px;
  }
  .verdict-box.good { background: #22c55e15; border: 1px solid #22c55e33; }
  .verdict-box.ok { background: #eab30815; border: 1px solid #eab30833; }
  .verdict-box.bad { background: #ef444415; border: 1px solid #ef444433; }
  .verdict-title {
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .verdict-desc {
    font-size: 0.85rem;
    color: #8b8fa3;
  }
  .disclaimer {
    text-align: center;
    font-size: 0.75rem;
    color: #555;
    margin-top: 24px;
  }
</style>
</head>
<body>
<div class="container">
  <h1>Unit Economics Calculator</h1>
  <p class="subtitle">Understand your per-customer profitability</p>

  <div class="card">
    <h2>Inputs</h2>
    <div class="input-row">
      <div class="input-group">
        <label for="cac">Customer Acquisition Cost ($)</label>
        <input type="number" id="cac" placeholder="e.g. 200" oninput="calc()">
      </div>
      <div class="input-group">
        <label for="arpu">Avg Revenue / User / Mo ($)</label>
        <input type="number" id="arpu" placeholder="e.g. 50" oninput="calc()">
      </div>
    </div>
    <div class="input-row">
      <div class="input-group">
        <label for="churn">Monthly Churn Rate (%)</label>
        <input type="number" id="churn" placeholder="e.g. 5" step="0.1" oninput="calc()">
      </div>
      <div class="input-group">
        <label for="margin">Gross Margin (%)</label>
        <input type="number" id="margin" placeholder="e.g. 70" step="0.1" oninput="calc()">
      </div>
    </div>
  </div>

  <div class="card" id="resultsCard" style="display:none;">
    <h2>Results</h2>
    <div id="metricsContainer"></div>
    <div id="verdictContainer"></div>
  </div>

  <p class="disclaimer">For planning purposes only. Not financial advice.</p>
</div>

<script>
function fmt(n) {
  if (n >= 1e6) return '$' + (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return '$' + (n / 1e3).toFixed(1) + 'K';
  return '$' + n.toFixed(0);
}

function calc() {
  var cac = parseFloat(document.getElementById('cac').value) || 0;
  var arpu = parseFloat(document.getElementById('arpu').value) || 0;
  var churn = parseFloat(document.getElementById('churn').value) || 0;
  var margin = parseFloat(document.getElementById('margin').value) || 0;

  if (cac <= 0 || arpu <= 0 || churn <= 0 || margin <= 0) {
    document.getElementById('resultsCard').style.display = 'none';
    return;
  }
  document.getElementById('resultsCard').style.display = '';

  var churnRate = churn / 100;
  var marginRate = margin / 100;
  var avgLifespan = 1 / churnRate;
  var ltv = (arpu * marginRate) / churnRate;
  var ltvCacRatio = ltv / cac;
  var mrrPerCustomer = arpu;
  var grossMrrPerCustomer = arpu * marginRate;
  var paybackMonths = grossMrrPerCustomer > 0 ? cac / grossMrrPerCustomer : Infinity;

  function ltvCacColor(r) { return r >= 3 ? 'green' : r >= 1 ? 'yellow' : 'red'; }
  function paybackColor(m) { return m <= 12 ? 'green' : m <= 18 ? 'yellow' : 'red'; }
  function churnColor(c) { return c < 5 ? 'green' : c <= 10 ? 'yellow' : 'red'; }

  var metrics = [
    {
      name: 'Lifetime Value (LTV)',
      value: fmt(ltv),
      color: ltvCacColor(ltvCacRatio),
      bench: 'Avg customer lifespan: ' + avgLifespan.toFixed(1) + ' months'
    },
    {
      name: 'LTV : CAC Ratio',
      value: ltvCacRatio.toFixed(1) + 'x',
      color: ltvCacColor(ltvCacRatio),
      bench: 'Green > 3x | Yellow 1-3x | Red < 1x'
    },
    {
      name: 'CAC Payback Period',
      value: paybackMonths === Infinity ? 'N/A' : paybackMonths.toFixed(1) + ' mo',
      color: paybackColor(paybackMonths),
      bench: 'Green < 12mo | Yellow 12-18mo | Red > 18mo'
    },
    {
      name: 'Monthly Churn Rate',
      value: churn.toFixed(1) + '%',
      color: churnColor(churn),
      bench: 'Green < 5% | Yellow 5-10% | Red > 10%'
    },
    {
      name: 'MRR per Customer',
      value: fmt(mrrPerCustomer),
      color: 'green',
      bench: 'Gross MRR per customer: ' + fmt(grossMrrPerCustomer)
    }
  ];

  var html = '';
  for (var i = 0; i < metrics.length; i++) {
    var m = metrics[i];
    html += '<div class="metric-card">' +
      '<div class="indicator ind-' + m.color + '"></div>' +
      '<div class="metric-info">' +
      '<div class="metric-name">' + m.name + '</div>' +
      '<div class="metric-value">' + m.value + '</div>' +
      '<div class="metric-benchmark">' + m.bench + '</div>' +
      '</div></div>';
  }
  document.getElementById('metricsContainer').innerHTML = html;

  var score = (ltvCacRatio >= 3 ? 2 : ltvCacRatio >= 1 ? 1 : 0) +
              (paybackMonths <= 12 ? 2 : paybackMonths <= 18 ? 1 : 0) +
              (churn < 5 ? 2 : churn <= 10 ? 1 : 0);

  var vClass, vTitle, vDesc;
  if (score >= 5) {
    vClass = 'good'; vTitle = 'Strong Unit Economics';
    vDesc = 'Your per-customer economics look healthy. Focus on scaling acquisition.';
  } else if (score >= 3) {
    vClass = 'ok'; vTitle = 'Unit Economics Need Work';
    vDesc = 'Some metrics are in range but there is room for improvement. Focus on reducing churn or CAC.';
  } else {
    vClass = 'bad'; vTitle = 'Unit Economics Are Weak';
    vDesc = 'You are spending more to acquire customers than they are worth. Revisit pricing, churn, or acquisition costs.';
  }

  document.getElementById('verdictContainer').innerHTML =
    '<div class="verdict-box ' + vClass + '">' +
    '<div class="verdict-title">' + vTitle + '</div>' +
    '<div class="verdict-desc">' + vDesc + '</div>' +
    '</div>';
}
</script>
</body>
</html>
