<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Startup Runway Calculator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f1117;
    color: #e1e4e8;
    min-height: 100vh;
    padding: 20px;
  }
  .container { max-width: 640px; margin: 0 auto; }
  h1 {
    text-align: center;
    font-size: 1.75rem;
    margin-bottom: 8px;
    color: #58a6ff;
  }
  .subtitle {
    text-align: center;
    color: #8b949e;
    margin-bottom: 32px;
    font-size: 0.9rem;
  }
  .card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
  }
  .card h2 {
    font-size: 1.1rem;
    margin-bottom: 20px;
    color: #c9d1d9;
  }
  .input-group {
    margin-bottom: 16px;
  }
  .input-group label {
    display: block;
    font-size: 0.85rem;
    color: #8b949e;
    margin-bottom: 6px;
  }
  .input-group input[type="number"] {
    width: 100%;
    padding: 10px 14px;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 8px;
    color: #e1e4e8;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-group input:focus {
    border-color: #58a6ff;
  }
  .results {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }
  @media (max-width: 480px) {
    .results { grid-template-columns: 1fr; }
  }
  .result-item {
    background: #0d1117;
    border-radius: 8px;
    padding: 16px;
    text-align: center;
  }
  .result-item .label {
    font-size: 0.75rem;
    color: #8b949e;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .result-item .value {
    font-size: 1.5rem;
    font-weight: 700;
  }
  .result-item .unit {
    font-size: 0.8rem;
    color: #8b949e;
  }
  .runway-bar-container {
    margin: 20px 0;
  }
  .runway-bar-bg {
    width: 100%;
    height: 24px;
    background: #21262d;
    border-radius: 12px;
    overflow: hidden;
    position: relative;
  }
  .runway-bar-fill {
    height: 100%;
    border-radius: 12px;
    transition: width 0.4s ease, background 0.4s ease;
    min-width: 2%;
  }
  .runway-bar-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.75rem;
    color: #8b949e;
    margin-top: 6px;
  }
  .green { color: #3fb950; }
  .yellow { color: #d29922; }
  .red { color: #f85149; }
  .bg-green { background: #238636; }
  .bg-yellow { background: #9e6a03; }
  .bg-red { background: #da3633; }
  .whatif-section {
    margin-top: 8px;
  }
  .slider-group {
    margin-bottom: 16px;
  }
  .slider-group .slider-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .slider-group label {
    font-size: 0.85rem;
    color: #8b949e;
  }
  .slider-group .slider-value {
    font-size: 0.9rem;
    font-weight: 600;
    color: #58a6ff;
  }
  input[type="range"] {
    width: 100%;
    -webkit-appearance: none;
    appearance: none;
    height: 6px;
    background: #30363d;
    border-radius: 3px;
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #58a6ff;
    cursor: pointer;
  }
  input[type="range"]::-moz-range-thumb {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #58a6ff;
    cursor: pointer;
    border: none;
  }
  .whatif-result {
    background: #0d1117;
    border-radius: 8px;
    padding: 16px;
    display: flex;
    justify-content: space-around;
    text-align: center;
  }
  .whatif-result .wi-label {
    font-size: 0.75rem;
    color: #8b949e;
    margin-bottom: 4px;
  }
  .whatif-result .wi-value {
    font-size: 1.25rem;
    font-weight: 700;
  }
  .disclaimer {
    text-align: center;
    font-size: 0.75rem;
    color: #484f58;
    margin-top: 24px;
  }
</style>
</head>
<body>
<div class="container">
  <h1>Startup Runway Calculator</h1>
  <p class="subtitle">Know exactly how long your cash will last</p>

  <div class="card">
    <h2>Your Numbers</h2>
    <div class="input-group">
      <label>Current Cash Balance ($)</label>
      <input type="number" id="cash" placeholder="500000" min="0" step="1000">
    </div>
    <div class="input-group">
      <label>Monthly Burn Rate ($)</label>
      <input type="number" id="burn" placeholder="50000" min="0" step="1000">
    </div>
    <div class="input-group">
      <label>Monthly Revenue ($)</label>
      <input type="number" id="revenue" placeholder="10000" min="0" step="1000">
    </div>
  </div>

  <div class="card">
    <h2>Runway Overview</h2>
    <div class="results">
      <div class="result-item">
        <div class="label">Net Burn</div>
        <div class="value" id="netBurn">--</div>
        <div class="unit">/ month</div>
      </div>
      <div class="result-item">
        <div class="label">Runway</div>
        <div class="value" id="runway">--</div>
        <div class="unit">months</div>
      </div>
      <div class="result-item">
        <div class="label">Runs Out</div>
        <div class="value" id="endDate">--</div>
        <div class="unit" id="endDateYear"></div>
      </div>
    </div>
    <div class="runway-bar-container">
      <div class="runway-bar-bg">
        <div class="runway-bar-fill" id="runwayBar" style="width:0%"></div>
      </div>
      <div class="runway-bar-label">
        <span>0 mo</span>
        <span>6 mo</span>
        <span>12 mo</span>
        <span>18 mo</span>
        <span>24 mo</span>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>What If?</h2>
    <div class="whatif-section">
      <div class="slider-group">
        <div class="slider-header">
          <label>Adjust Burn Rate</label>
          <span class="slider-value" id="sliderBurnLabel">--</span>
        </div>
        <input type="range" id="burnSlider" min="0" max="200000" step="1000" value="50000">
      </div>
      <div class="slider-group">
        <div class="slider-header">
          <label>Adjust Revenue</label>
          <span class="slider-value" id="sliderRevLabel">--</span>
        </div>
        <input type="range" id="revSlider" min="0" max="200000" step="1000" value="10000">
      </div>
      <div class="whatif-result">
        <div>
          <div class="wi-label">New Net Burn</div>
          <div class="wi-value" id="wiNetBurn">--</div>
        </div>
        <div>
          <div class="wi-label">New Runway</div>
          <div class="wi-value" id="wiRunway">--</div>
        </div>
        <div>
          <div class="wi-label">Change</div>
          <div class="wi-value" id="wiDelta">--</div>
        </div>
      </div>
    </div>
  </div>

  <p class="disclaimer">For planning purposes only. Not financial advice.</p>
</div>

<script>
  const $ = id => document.getElementById(id);
  const fmt = n => {
    if (n >= 1e6) return '$' + (n / 1e6).toFixed(1) + 'M';
    if (n >= 1e3) return '$' + (n / 1e3).toFixed(0) + 'K';
    return '$' + n.toLocaleString();
  };

  function getInputs() {
    return {
      cash: parseFloat($('cash').value) || 0,
      burn: parseFloat($('burn').value) || 0,
      revenue: parseFloat($('revenue').value) || 0
    };
  }

  function calcRunway(cash, netBurn) {
    if (netBurn <= 0) return Infinity;
    return cash / netBurn;
  }

  function runwayColor(months) {
    if (months > 12) return 'green';
    if (months >= 6) return 'yellow';
    return 'red';
  }

  function update() {
    const { cash, burn, revenue } = getInputs();
    const netBurn = Math.max(burn - revenue, 0);
    const months = calcRunway(cash, netBurn);

    $('netBurn').textContent = fmt(netBurn);
    const color = runwayColor(months);
    $('netBurn').className = 'value ' + color;

    if (months === Infinity) {
      $('runway').textContent = '\u221e';
      $('runway').className = 'value green';
      $('endDate').textContent = 'Never';
      $('endDateYear').textContent = '';
    } else {
      $('runway').textContent = months.toFixed(1);
      $('runway').className = 'value ' + color;
      const end = new Date();
      end.setMonth(end.getMonth() + Math.floor(months));
      const moNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      $('endDate').textContent = moNames[end.getMonth()] + ' ' + end.getDate();
      $('endDateYear').textContent = end.getFullYear();
    }

    // Bar: 24 months = 100%
    const pct = months === Infinity ? 100 : Math.min((months / 24) * 100, 100);
    const bar = $('runwayBar');
    bar.style.width = pct + '%';
    bar.className = 'runway-bar-fill bg-' + color;

    // Sync sliders
    $('burnSlider').value = burn;
    $('burnSlider').max = Math.max(burn * 2, 200000);
    $('revSlider').value = revenue;
    $('revSlider').max = Math.max(revenue * 2, 200000);
    updateWhatIf();
  }

  function updateWhatIf() {
    const cash = parseFloat($('cash').value) || 0;
    const origBurn = parseFloat($('burn').value) || 0;
    const origRev = parseFloat($('revenue').value) || 0;
    const origNet = Math.max(origBurn - origRev, 0);
    const origMonths = calcRunway(cash, origNet);

    const newBurn = parseFloat($('burnSlider').value);
    const newRev = parseFloat($('revSlider').value);
    const newNet = Math.max(newBurn - newRev, 0);
    const newMonths = calcRunway(cash, newNet);

    $('sliderBurnLabel').textContent = fmt(newBurn);
    $('sliderRevLabel').textContent = fmt(newRev);
    $('wiNetBurn').textContent = fmt(newNet);

    const color = runwayColor(newMonths);
    if (newMonths === Infinity) {
      $('wiRunway').textContent = '\u221e';
      $('wiRunway').className = 'wi-value green';
    } else {
      $('wiRunway').textContent = newMonths.toFixed(1) + ' mo';
      $('wiRunway').className = 'wi-value ' + color;
    }

    let delta;
    if (newMonths === Infinity && origMonths === Infinity) delta = 0;
    else if (newMonths === Infinity) delta = Infinity;
    else if (origMonths === Infinity) delta = -Infinity;
    else delta = newMonths - origMonths;

    if (delta === Infinity) {
      $('wiDelta').textContent = '+\u221e';
      $('wiDelta').className = 'wi-value green';
    } else if (delta === -Infinity) {
      $('wiDelta').textContent = '-\u221e';
      $('wiDelta').className = 'wi-value red';
    } else {
      const sign = delta >= 0 ? '+' : '';
      $('wiDelta').textContent = sign + delta.toFixed(1) + ' mo';
      $('wiDelta').className = 'wi-value ' + (delta >= 0 ? 'green' : 'red');
    }
  }

  $('cash').addEventListener('input', update);
  $('burn').addEventListener('input', update);
  $('revenue').addEventListener('input', update);
  $('burnSlider').addEventListener('input', updateWhatIf);
  $('revSlider').addEventListener('input', updateWhatIf);
</script>
</body>
</html>
