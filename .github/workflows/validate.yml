name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON files
        run: |
          echo "Validating JSON files..."
          for f in $(find . -name "*.json" -not -path "./.git/*"); do
            echo "  Checking $f"
            python3 -c "import json; json.load(open('$f'))" || exit 1
          done
          echo "All JSON files valid."

      - name: Check MANIFEST.json counts
        run: |
          echo "Checking MANIFEST.json accuracy..."
          PLAYBOOK_COUNT=$(find references/playbooks -name "*.md" ! -name "README.md" | wc -l)
          MANIFEST_PLAYBOOKS=$(python3 -c "import json; print(json.load(open('MANIFEST.json'))['playbooks'])")
          echo "  Playbooks on disk: $PLAYBOOK_COUNT"
          echo "  MANIFEST claims: $MANIFEST_PLAYBOOKS"
          if [ "$PLAYBOOK_COUNT" -lt "$MANIFEST_PLAYBOOKS" ]; then
            echo "ERROR: MANIFEST.json claims $MANIFEST_PLAYBOOKS playbooks but only $PLAYBOOK_COUNT found"
            exit 1
          fi

          DIR_COUNT=$(python3 -c "import json; dirs=json.load(open('MANIFEST.json'))['reference_directories']; print(len(dirs))")
          echo "  Reference directories in MANIFEST: $DIR_COUNT"
          python3 -c "
          import json, os
          dirs = json.load(open('MANIFEST.json'))['reference_directories']
          missing = [d for d in dirs if not os.path.isdir(d)]
          if missing:
              print(f'ERROR: Missing directories: {missing}')
              exit(1)
          print('  All reference directories exist.')
          "

      - name: Check for broken internal links in SKILL.md
        run: |
          echo "Checking SKILL.md internal file references..."
          python3 -c "
          import re, os
          with open('SKILL.md') as f:
              content = f.read()
          paths = re.findall(r'\x60(references/[^\x60\s]+\.md)\x60', content)
          missing = [p for p in paths if not os.path.exists(p)]
          if missing:
              print('ERROR: SKILL.md references files that do not exist:')
              for m in missing:
                  print(f'  - {m}')
              exit(1)
          print(f'  All {len(paths)} file references in SKILL.md exist.')
          "

      - name: Validate eval test cases
        run: |
          echo "Validating eval-set.json..."
          python3 -c "
          import json
          data = json.load(open('evals/eval-set.json'))
          cases = data['test_cases']
          ids = [c['id'] for c in cases]
          dupes = [i for i in ids if ids.count(i) > 1]
          if dupes:
              print(f'ERROR: Duplicate eval IDs: {set(dupes)}')
              exit(1)
          positive = sum(1 for c in cases if c['should_trigger'])
          negative = sum(1 for c in cases if not c['should_trigger'])
          print(f'  {len(cases)} test cases ({positive} positive, {negative} negative)')
          for c in cases:
              if c['should_trigger'] and not c.get('expected_route'):
                  print(f'ERROR: {c[\"id\"]} triggers but has no expected_route')
                  exit(1)
          print('  All test cases valid.')
          "

      - name: Check playbook cross-references
        run: |
          echo "Checking playbook cross-references..."
          python3 -c "
          import re, os, glob
          errors = []
          for f in glob.glob('references/playbooks/*.md'):
              with open(f) as fh:
                  content = fh.read()
              links = re.findall(r'\[([^\]]+)\]\(([^)]+\.md)\)', content)
              for text, target in links:
                  target_path = os.path.join(os.path.dirname(f), target)
                  if not os.path.exists(target_path):
                      errors.append(f'{f}: broken link to {target}')
          if errors:
              print('ERROR: Broken cross-references:')
              for e in errors:
                  print(f'  - {e}')
              exit(1)
          print('  All playbook cross-references valid.')
          "

      - name: Check MANIFEST inventory counts match disk
        run: |
          echo "Checking MANIFEST.json inventory counts..."
          python3 -c "
          import json, glob, re
          m = json.load(open('MANIFEST.json'))

          eval_count = len(json.load(open('evals/eval-set.json'))['test_cases'])
          if m.get('evals') != eval_count:
              print(f'ERROR: MANIFEST.evals={m.get(\"evals\")} but eval-set.json has {eval_count} test cases')
              exit(1)
          print(f'  Evals: {eval_count} (matches MANIFEST)')

          app_count = len(glob.glob('apps/*.html'))
          if m.get('apps') != app_count:
              print(f'ERROR: MANIFEST.apps={m.get(\"apps\")} but apps/ has {app_count} HTML files')
              exit(1)
          print(f'  Apps: {app_count} (matches MANIFEST)')

          cmds = set()
          for f in glob.glob('references/commands/*.md'):
              if f.endswith('README.md'): continue
              with open(f) as fh:
                  for match in re.findall(r'(?:^|\s)(/[a-z][a-z0-9-]*)\b', fh.read(), re.MULTILINE):
                      if not any(x in match for x in ['/github', '/claude', '/www']):
                          cmds.add(match)
          if m.get('commands') != len(cmds):
              print(f'ERROR: MANIFEST.commands={m.get(\"commands\")} but {len(cmds)} distinct commands found in references/commands/')
              exit(1)
          print(f'  Commands: {len(cmds)} (matches MANIFEST)')
          "

      - name: Validate eval route aliases resolve via SKILL.md
        run: |
          echo "Checking every eval expected_route resolves to a SKILL.md Routing Alias..."
          python3 -c "
          import json, re, os
          with open('SKILL.md') as f:
              skill = f.read()
          m = re.search(r'## Routing Aliases.*?\n(.*)', skill, re.DOTALL)
          if not m:
              print('ERROR: SKILL.md is missing the \"Routing Aliases\" section')
              exit(1)
          table = m.group(1)
          aliases = {}
          for row in re.finditer(r'\|\s*\`([a-z0-9-]+)\`\s*\|\s*(command|file|directory)\s*\|\s*\`([^\`]+)\`\s*\|', table):
              alias, kind, target = row.group(1), row.group(2), row.group(3)
              aliases[alias] = (kind, target)
          print(f'  Loaded {len(aliases)} aliases from SKILL.md')

          errors = []
          for alias, (kind, target) in aliases.items():
              if kind == 'file' and not os.path.exists(target):
                  errors.append(f'{alias} -> {target} (file missing)')
              elif kind == 'directory' and not os.path.isdir(target.rstrip('/')):
                  errors.append(f'{alias} -> {target} (directory missing)')
          if errors:
              print('ERROR: Alias targets do not exist on disk:')
              for e in errors: print(f'  - {e}')
              exit(1)

          cases = json.load(open('evals/eval-set.json'))['test_cases']
          unresolved = []
          for c in cases:
              if c.get('should_trigger') and c.get('expected_route'):
                  if c['expected_route'] not in aliases:
                      unresolved.append(f'{c[\"id\"]}: expected_route \"{c[\"expected_route\"]}\" not in Routing Aliases')
          if unresolved:
              print('ERROR: Unresolved eval routes:')
              for u in unresolved: print(f'  - {u}')
              exit(1)
          print(f'  All {sum(1 for c in cases if c.get(\"should_trigger\") and c.get(\"expected_route\"))} positive eval routes resolve.')
          "
